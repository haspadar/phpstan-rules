override:
    ci.pr.max_lines_changed: 1000
    ci.php.matrix: ["8.3", "8.4", "8.5"]
    typos.exclude: ["docs/"]
    phpunit.php_options: "-d memory_limit=512M"
    phpunit.testsuites.integration: []
    phpmetrics.complexity.max_weighted_methods_per_class: 40
    phpmetrics.complexity.max_cyclomatic_per_method: [12]
    phpmetrics.structure.max_methods_per_class: [11]
    phpmd.cyclomatic: [12]
    sonar.exclusions: ["../../tests/**"]
    psalm.suppress.possibly_unused: ["../../src"]

append:
    phpstan.neon_includes:
        - "../../rules.neon"
        - "../../rules-ignore.neon"
