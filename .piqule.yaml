override:
    coverage.patch.target: 85
    coverage.project.target: 85
    ci.pr.max_lines_changed: 1500
    ci.php.matrix: ["8.3", "8.4", "8.5"]
    typos.exclude: ["docs/"]
    phpunit.php_options: "-d memory_limit=512M"
    phpunit.testsuites.integration: []
    phpmetrics.complexity.max_weighted_methods_per_class: 40
    phpmetrics.complexity.max_cyclomatic_per_method: [12]
    phpmetrics.structure.max_methods_per_class: [11]
    phpmd.cyclomatic: [12]
    shellcheck.ignore_dirs: ["vendor", "tests", ".git", ".claude"]
    yamllint.ignore: ["vendor/**", "tests/**", ".git/**", ".piqule/**/html/**", ".piqule/**/coverage-report/**", ".piqule/config.yaml", ".claude/**"]
    sonar.organization: haspadar-org
    sonar.projectKey: haspadar_phpstan-rules
    sonar.exclusions: ["tests/**"]
    psalm.suppress.possibly_unused: ["../../src"]
    phpstan.neon_includes:
        - "../../vendor/phpstan/phpstan-strict-rules/rules.neon"
        - "../../rules.neon"
        - "../../rules-ignore.neon"

envs:
    COMPOSER_ROOT_VERSION: "git describe --tags --abbrev=0 | sed 's/^v//'"
